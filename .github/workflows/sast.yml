name: DevPrivOps Privacy Scanner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan-privacy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Run Lightweight SAST Scanner
      run: python sast_scanner.py
